<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">
    <div class="container">
        <div class="page-header">
            <h1>새로운 팀 생성</h1>
        </div>

        <div class="form-card" style="max-width: 560px; margin: 0 auto;">
            <!-- th:action 사용하면 CSRF 토큰이 자동으로 추가됨 -->
            <form th:action="@{/teams/create}"
                  th:object="${teamCreateRequest}"
                  method="post">

                <div class="form-group">
                    <label>팀 이름 <span style="color: var(--color-error);">*</span></label>
                    <input type="text"
                           name="teamName"
                           placeholder="예: 개발팀, 마케팅팀"
                           maxlength="100"
                           required>
                    <div class="error" th:if="${#fields.hasErrors('teamName')}"
                         th:errors="*{teamName}">
                        팀 이름 오류
                    </div>
                </div>

                <div class="form-group">
                    <label>팀 설명</label>
                    <textarea name="description"
                              placeholder="팀에 대한 간단한 설명을 입력해주세요. (선택사항)"
                              id="description"
                              maxlength="500"></textarea>
                    <div class="error" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}">
                        설명 오류
                    </div>
                    <small id="textLengthCheck">( 0 / 최대 500자 )</small>
                </div>

                <div class="form-actions">
                    <a th:href="@{/teams}" class="btn btn-ghost">취소</a>
                    <button type="submit" class="btn btn-primary">팀 만들기</button>
                </div>
            </form>
        </div>

    </div>
</div>

<script layout:fragment="script" th:inline="javascript">
    /*<![CDATA[*/
    var message = /*[[${message}]]*/ null;
    var error = /*[[${error}]]*/ null;

    if (message) {
        alert(message);
    }
    if (error) {
        alert("에러: " + error);
    }
    /*]]>*/

    document.addEventListener('DOMContentLoaded', function() {
        var textarea = document.getElementById('description');
        var lengthCheck = document.getElementById('textLengthCheck');

        if (textarea && lengthCheck) {
            function updateLength() {
                var content = textarea.value;
                var length = content.length;
                lengthCheck.textContent = '( ' + length + ' / 최대 500자 )';

                if (length > 500) {
                    alert('최대 500자까지 입력 가능합니다.');
                    textarea.value = content.substring(0, 500);
                    lengthCheck.textContent = '( 500 / 최대 500자 )';
                }
            }

            textarea.addEventListener('keyup', updateLength);
            textarea.addEventListener('keydown', updateLength);
            textarea.addEventListener('change', updateLength);

            updateLength();
        } else {
            console.error('textarea 또는 lengthCheck 요소를 찾을 수 없습니다.');
        }
    });
</script>

</html>
