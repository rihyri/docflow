<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">
    <div class="container">
        <div class="team-header">
            <h1 th:text="${team.teamName}">팀 이름</h1>
            <span th:text="${team.myRole}">내 역할</span>
        </div>

        <div class="team-info">
            <div class="info-row">
                <strong>팀장</strong>
                <span th:text="${team.ownerName}">소유자</span>
            </div>
            <div class="info-row">
                <strong>생성일</strong>
                <span th:text="${#temporals.format(team.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
            </div>
            <div class="info-row" th:if="${team.description != null}">
                <strong>설명</strong>
                <p th:text="${team.description}">팀 설명</p>
            </div>
        </div>

        <div class="action-bar">
            <a th:href="@{/teams}" class="btn btn-ghost btn-sm">← 목록으로</a>

            <a th:href="@{/documents/list(teamNo=${team.teamNo})}" class="btn btn-primary btn-sm">
                팀 문서 관리
            </a>

            <button th:if="${team.myRole.name() == 'OWNER'}" onclick="showModifyModal()" class="btn btn-secondary btn-sm">팀정보 수정</button>

            <button th:if="${team.myRole.name() == 'OWNER'}"
                    onclick="deleteTeam(event)" class="btn btn-sm team-danger">
                팀 삭제
            </button>

            <button th:if="${team.myRole != '' && team.myRole.name() != 'OWNER'}" onclick="withdrawTeam(event)" class="btn btn-ghost btn-sm">
                탈퇴하기
            </button>
        </div>

        <div class="team-members">
            <div class="section-header">
                <h2>팀 멤버 (<span th:text="${team.members.size()}">0</span>명)</h2>

                <button th:if="${team.myRole.name() == 'OWNER' or team.myRole.name() == 'ADMIN'}" onclick="showInviteModal()" class="btn btn-primary btn-sm">
                    + 멤버 초대
                </button>
            </div>

            <div class="table-wrapper">
                <table th:if="${not #lists.isEmpty(team.members)}">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>역할</th>
                            <th>가입일</th>
                            <th th:if="${team.myRole.name() == 'OWNER' or team.myRole.name() == 'ADMIN'}">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="member : ${team.members}">
                            <td th:text="${member.memberName}"></td>
                            <td th:text="${member.email}"></td>
                            <td th:text="${member.role}"></td>
                            <td th:text="${#temporals.format(member.joinedAt, 'yyyy-MM-dd')}"></td>
                            <td th:if="${team.myRole.name() == 'OWNER' or team.myRole.name() == 'ADMIN'}">
                                <button th:if="${member.role.name() != 'OWNER'}"
                                        th:onclick="'changeRole(' + ${member.memberNo} + ')'"
                                        class="btn btn-ghost btn-sm">
                                    역할 변경
                                </button>
                                <span th:if="${member.role.name() == 'OWNER'}" class="text-muted">관리자</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(team.members)}" class="empty-state" style="margin-top: var(--space-4);">
                팀 멤버가 없습니다.
            </div>
        </div>
    </div>

    <!-- 멤버 초대 모달 -->
    <div id="inviteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeInviteModal()">&times;</span>
            <h2>멤버 초대</h2>
            <form id="inviteForm" onsubmit="inviteMember(event)">

                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="inviteMemberId" placeholder="초대할 사람의 아이디" required />
                </div>

                <div class="form-group">
                    <label>역할</label>
                    <select id="inviteRole" required>
                        <option value="MEMBER">MEMBER (일반 멤버)</option>
                        <option value="ADMIN" th:if="${team.myRole.name() == 'OWNER'}">ADMIN (관리자)</option>
                        <option value="VIEWER">VIEWER (조회만 가능)</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" onclick="closeInviteModal()" class="btn btn-ghost">닫기</button>
                    <button type="submit" class="btn btn-primary">초대하기</button>
                </div>

            </form>
        </div>
    </div>

    <!-- 팀 정보 수정하기 모달 -->
    <div id="modifyModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModifyModal()">&times;</span>
            <h2>팀 정보 수정</h2>
            <form id="modifyForm" onsubmit="modifyTeam(event)">
                <div class="form-group">
                    <label>팀 이름</label>
                    <input th:value="${team.teamName}" type="text" id="teamName" name="teamName" />
                </div>
                <div class="form-group">
                    <label>팀 정보</label>
                    <textarea th:text="${team.description}" id="description" name="description"></textarea>
                </div>
                <small id="textLengthCheck">( 0 / 최대 500자 )</small>
                <div class="modal-actions">
                    <button type="button" onclick="closeModifyModal()" class="btn btn-ghost">닫기</button>
                    <button type="submit" class="btn btn-primary">수정하기</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script layout:fragment="script" th:inline="javascript">

    /*<![CDATA[*/
    var teamNo = /*[[${team.teamNo}]]*/ 0;
    const csrfToken = /*[[${_csrf.token}]]*/ null;
    const csrfHeader = /*[[${_csrf.headerName}]]*/ null;
    var message = /*[[${message}]]*/ null;
    var error = /*[[${error}]]*/ null;

    if (message) {
        alert(message);
    }
    if (error) {
        alert("에러: " + error);
    }
    /*]]>*/

    // textarea 글자수 표시
    document.addEventListener('DOMContentLoaded', function() {
        var textarea = document.getElementById('description');
        var lengthCheck = document.getElementById('textLengthCheck');

        if (textarea && lengthCheck) {
            function updateLength() {
                var content = textarea.value;
                var length = content.length;
                lengthCheck.textContent = '( ' + length + ' / 최대 500자 )';

                if (length > 500) {
                    alert('최대 500자까지 입력 가능합니다.');
                    textarea.value = content.substring(0, 500);
                    lengthCheck.textContent = '( 500 / 최대 500자 )';
                }
            }

            textarea.addEventListener('keyup', updateLength);
            textarea.addEventListener('keydown', updateLength);
            textarea.addEventListener('change', updateLength);

            updateLength();
        } else {
            console.error('textarea 또는 lengthCheck 요소를 찾을 수 없습니다.');
        }
    });

    // 모달 열기
    function showInviteModal() {
        document.getElementById('inviteModal').style.display = 'block';
    }

    function showModifyModal() {
        document.getElementById('modifyModal').style.display = 'block';
    }

    // 모달 닫기
    function closeInviteModal() {
        document.getElementById('inviteModal').style.display = 'none';
        document.getElementById('inviteForm').reset();
    }

    function closeModifyModal() {
        document.getElementById('modifyModal').style.display = 'none';
        document.getElementById('modifyForm').reset();
    }

    // 멤버 초대
    function inviteMember(event) {

        event.preventDefault();

        const memberId = document.getElementById('inviteMemberId').value;
        const role = document.getElementById('inviteRole').value;

        fetch(`/teams/${teamNo}/invite`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify({ memberId: memberId, role: role })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('멤버 초대가 완료되었습니다.');
                closeInviteModal();
                location.reload();
            } else {
                alert('초대 실패: ' + data.message);
            }
        })
        .catch(error => {
            alert('오류가 발생하였습니다: ' + error);
        });
    }

    // 팀 정보 변경
    function modifyTeam(event) {

        event.preventDefault();

        const teamName = document.getElementById('teamName').value;
        const description = document.getElementById('description').value;

        if (!teamName.trim()) {
            alert('팀 이름은 반드시 입력해야합니다.');
            return false;
        }

        fetch(`/teams/${teamNo}/modify`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify({ teamName: teamName, description: description })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('팀 정보가 성공적으로 수행되었습니다.');
                closeModifyModal();
                location.reload();
            } else {
                alert('팀 정보 수정 실패: ' + data.message);
            }
        })
        .catch(error => {
            alert('오류가 발생하였습니다.: ' + error);
        });
    }

    // 팀 삭제
    function deleteTeam(event) {

        event.preventDefault();

        if (confirm('정말로 삭제하시겠습니까?\n* 삭제된 팀은 복구가 어렵습니다.')) {
            fetch(`/teams/${teamNo}/inactive`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('팀이 삭제되었습니다.');
                    closeInviteModal();
                    window.location.href = '/teams';
                } else {
                    alert('팀 삭제 실패: ' + data.message);
                }
            })
            .catch(error => {
                alert('오류가 발생하였습니다.: ' + error);
            });
        }
    }

    // 회원 팀 탈퇴
    function withdrawTeam(event) {

        event.preventDefault();

        if (confirm('정말로 팀을 탈퇴하시겠습니까?\n재가입을 원할 경우 가입 절차를 다시 실행해야 합니다.')) {

            fetch(`/teams/${teamNo}/withdraw-team`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('탈퇴가 성공적으로 이루어졌습니다.');
                    window.location.href = '/teams';
                } else {
                    alert('회원 팀 탈퇴 실패: ' + data.message);
                }
            })
            .catch(error => {
                alert('오류가 발생하였습니다.: ' + error);
            });
        }
    }

    // 팀 역할 변경
    function changeRole(memberNo) {
        const newRole = prompt("변경할 역할을 입력하세요. (ADMIN / MEMBER / VIEWER)");

        const teamNo = [[${team.teamNo}]];

        fetch(`/teams/${teamNo}/members/${memberNo}/role`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify({ role: newRole.toUpperCase() })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("역할이 변경되었습니다.");
                location.reload();
            } else {
                alert("오류: " + (data.message ?? "알 수 없는 오류입니다."));
            }
        });
    }

</script>

</html>
