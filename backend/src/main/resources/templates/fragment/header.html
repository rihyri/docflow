<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav class="navbar" th:fragment="header">
    <a href="/" class="navbar-brand">DocFlow</a>

    <div class="navbar-nav">
        <a th:href="@{/teams}">팀목록</a>
    </div>

    <div class="navbar-actions" sec:authorize="isAuthenticated()">
        <span class="navbar-user">
            <span sec:authentication="name"></span> 님 환영합니다
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-ghost btn-sm">로그아웃</button>
        </form>
    </div>

    <div class="navbar-actions" sec:authorize="isAnonymous()">
        <a th:href="@{/join}" class="btn btn-ghost btn-sm">회원가입</a>
        <a th:href="@{/login}" class="btn btn-primary btn-sm">로그인</a>
    </div>
</nav>
</html>
